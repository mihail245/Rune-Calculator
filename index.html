<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob Incremental - Rune Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e0e0e6;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: #1a1a1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2d2d35;
        }
        h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #26262b;
            border: 1px solid #3a3a42;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
        }
        input:focus {
            border-color: #0080ff;
            outline: none;
        }
        .grid-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.5fr;
            font-weight: bold;
            border-bottom: 2px solid #3a3a42;
            padding: 10px 5px;
            margin-top: 25px;
            color: #fff;
            font-size: 15px;
        }
        .rune-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.5fr;
            padding: 12px 5px;
            border-bottom: 1px solid #26262b;
            align-items: center;
        }
        .rune-name {
            font-weight: bold;
            font-size: 16px;
            text-shadow: 0 0 8px rgba(0,0,0,0.5);
        }
        .rune-chance {
            color: #bbb;
            font-size: 14px;
        }
        .time-eta {
            font-family: monospace;
            font-size: 14px;
            color: #00ffaa;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Rune Calculator (Noob Incremental)</h2>
    
    <div class="input-group">
        <label for="speed">Скорость рун (Rune Speed / секунд на бросок):</label>
        <input type="number" id="speed" value="1" step="0.01" min="0.01" oninput="calculateETA()">
    </div>
    
    <div class="input-group">
        <label for="luck">Удача рун (Rune Luck множитель):</label>
        <input type="number" id="luck" value="1" step="0.1" min="0.01" oninput="calculateETA()">
    </div>

    <div class="grid-header">
        <div>Руна</div>
        <div>Шанс</div>
        <div>Ожидаемое время</div>
    </div>
    
    <div id="runes-list"></div>
</div>

<script>
    // База данных вшита прямо в код, чтобы не блокировалась браузером
    const runesDatabase = [
        { name: "Rookie", chance: 1.25, displayChance: "1/1.25", color: "#e1cbff" },
        { name: "Learner", chance: 6.67, displayChance: "1/6.67", color: "#00e600" },
        { name: "Trained", chance: 10, displayChance: "1/10", color: "#0080ff" },
        { name: "Skilled", chance: 10, displayChance: "1/10", color: "#b300b3" },
        { name: "Expert", chance: 10, displayChance: "1/10", color: "#ffaa00" },
        { name: "Master", chance: 10, displayChance: "1/10", color: "#ff0000" },
        { name: "Grandmaster", chance: 10, displayChance: "1/10", color: "#ff5500" },
        { name: "Celestial", chance: 10, displayChance: "1/10", color: "#ff00ff" },
        { name: "Immortal", chance: 115990000000, displayChance: "1/115.99B", color: "#00bfff" },
        { name: "Shadow", chance: 1e21, displayChance: "1/10Sx", color: "#9d4edd" },
        { name: "Phantom", chance: 1e29, displayChance: "1/100Oc", color: "#ff007f" },
        { name: "Atomic", chance: 1.33e60, displayChance: "1/1.33QnDe", color: "#af40ff" }
    ];

    function formatTime(seconds) {
        if (seconds === Infinity || isNaN(seconds)) return "Никогда";
        if (seconds < 60) return `${seconds.toFixed(1)} сек`;
        
        let minutes = seconds / 60;
        if (minutes < 60) return `${Math.floor(minutes)} мин ${Math.floor(seconds % 60)} сек`;
        
        let hours = minutes / 60;
        if (hours < 24) return `${Math.floor(hours)} ч ${Math.floor(minutes % 60)} мин`;
        
        let days = hours / 24;
        if (days < 365) return `${Math.floor(days)} дн ${Math.floor(hours % 24)} ч`;
        
        let years = days / 365;
        if (years < 1e6) return `${Math.floor(years).toLocaleString()} лет`;
        return `${years.toExponential(2)} лет`;
    }

    function calculateETA() {
        const speed = parseFloat(document.getElementById('speed').value) || 1;
        const luck = parseFloat(document.getElementById('luck').value) || 1;
        const listContainer = document.getElementById('runes-list');
        
        listContainer.innerHTML = ""; 

        runesDatabase.forEach(rune => {
            let realChance = rune.chance / luck;
            if (realChance < 1) realChance = 1; 
            
            let etaSeconds = realChance * speed;

            const row = document.createElement('div');
            row.className = 'rune-row';
            row.innerHTML = `
                <div class="rune-name" style="color: ${rune.color}">${rune.name}</div>
                <div class="rune-chance">${rune.displayChance}</div>
                <div class="time-eta">${formatTime(etaSeconds)}</div>
            `;
            listContainer.appendChild(row);
        });
    }

    // Запуск расчета сразу при открытии
    window.onload = calculateETA;
</script>

</body>
</html>
