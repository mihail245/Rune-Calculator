<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob Incremental - Rune Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e0e0e6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: #1a1a1e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2d2d35;
        }
        h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #26262b;
            border: 1px solid #3a3a42;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
        }
        input:focus {
            border-color: #0080ff;
            outline: none;
        }
        .grid-header {
            display: grid;
            grid-template-columns: 2fr 1fr 2fr;
            font-weight: bold;
            border-bottom: 2px solid #3a3a42;
            padding: 10px 5px;
            margin-top: 25px;
            color: #fff;
        }
        .rune-row {
            display: grid;
            grid-template-columns: 2fr 1fr 2fr;
            padding: 10px 5px;
            border-bottom: 1px solid #26262b;
            align-items: center;
        }
        .rune-name {
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
        .time-eta {
            font-family: monospace;
            font-size: 14px;
            color: #00ffaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Rune Calculator (Noob Incremental)</h2>
    
    <div class="input-group">
        <label for="speed">Скорость рун (Rune Speed / секунд на бросок):</label>
        <input type="number" id="speed" value="1" step="0.01" min="0.01" oninput="calculateETA()">
    </div>
    
    <div class="input-group">
        <label for="luck">Удача рун (Rune Luck множитель, например 1 или 2.5):</label>
        <input type="number" id="luck" value="1" step="0.1" min="0.01" oninput="calculateETA()">
    </div>

    <div class="grid-header">
        <div>Руна</div>
        <div>Шанс</div>
        <div>Ожидаемое время (ETA)</div>
    </div>
    
    <div id="runes-list"></div>
</div>

<!-- Подключаем наш отдельный файл с рунами -->
<script src="runes.js"></script>
<script>
    // Функция красивого форматирования времени
    function formatTime(seconds) {
        if (seconds === Infinity || isNaN(seconds)) return "Никогда";
        if (seconds < 60) return `${seconds.toFixed(1)} сек`;
        
        let minutes = seconds / 60;
        if (minutes < 60) return `${Math.floor(minutes)} мин ${Math.floor(seconds % 60)} сек`;
        
        let hours = minutes / 60;
        if (hours < 24) return `${Math.floor(hours)} ч ${Math.floor(minutes % 60)} мин`;
        
        let days = hours / 24;
        if (days < 365) return `${Math.floor(days)} дн ${Math.floor(hours % 24)} ч`;
        
        let years = days / 365;
        return `${years.toExponential(2)} лет`;
    }

    // Логика расчета
    function calculateETA() {
        const speed = parseFloat(document.getElementById('speed').value) || 1;
        const luck = parseFloat(document.getElementById('luck').value) || 1;
        const listContainer = document.getElementById('runes-list');
        
        listContainer.innerHTML = ""; // Очищаем список перед пересчетом

        runesDatabase.forEach(rune => {
            // Формула: Реальный шанс = Базовый шанс / Удачу
            // Время (сек) = Реальный шанс * Скорость броска
            let realChance = rune.chance / luck;
            if (realChance < 1) realChance = 1; // Шанс не может быть чаще чем 1/1
            
            let etaSeconds = realChance * speed;

            // Создаем строку для таблицы
            const row = document.createElement('div');
            row.className = 'rune-row';
            row.innerHTML = `
                <div class="rune-name" style="color: ${rune.color}">${rune.name}</div>
                <div>${rune.displayChance}</div>
                <div class="time-eta">${formatTime(etaSeconds)}</div>
            `;
            listContainer.appendChild(row);
        });
    }

    // Запускаем расчет при первой загрузке страницы
    window.onload = calculateETA;
</script>

</body>
</html>
